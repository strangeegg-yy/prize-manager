<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#222222">
  <title>プライズ管理</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f4;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #222;
      --muted: #888;
      --accent: #222;
      --accent-fg: #fff;
      --green: #43a047;
      --green-bg: #e8f5e9;
      --red: #e53935;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .tab-btn {
      padding: 7px 14px;
      border: 1.5px solid #bbb;
      border-radius: 20px;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text);
      transition: background .15s, color .15s;
    }
    .tab-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

    /* ── Panes ── */
    .pane { display: none; padding: 14px; max-width: 640px; margin: 0 auto; }
    .pane.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card-flush { padding: 0; overflow: hidden; }

    /* ── Typography ── */
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 8px 0 6px;
      border-bottom: 1px solid var(--border);
      margin: 16px 0 12px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      appearance: auto;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-block { width: 100%; display: flex; margin-top: 6px; }
    .btn-primary { background: var(--accent); color: var(--accent-fg); }
    .btn-secondary { background: #eeeeee; color: var(--text); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    /* ── Product list ── */
    .product-item {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .product-item:last-child { border-bottom: none; }
    .product-item:active { background: #f5f5f5; }
    .product-item.assist-on { background: var(--green-bg); }

    /* 左：価格エリア */
    .product-price-col {
      flex: 0 0 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 6px;
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,.02);
    }
    .price-main { font-size: 17px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .price-label { font-size: 9px; color: var(--muted); margin-top: 2px; }
    .price-trend-up   { font-size: 10px; color: #e53935; }
    .price-trend-down { font-size: 10px; color: #43a047; }
    .price-trend-flat { font-size: 10px; color: var(--muted); }

    /* 右：詳細エリア */
    .product-info-col {
      flex: 1;
      padding: 10px 12px;
      min-width: 0;
    }
    .product-name {
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 5px;
      word-break: break-all;
    }
    .product-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-assist { background: var(--green); color: #fff; }
    .badge-count  { background: #f0f0f0; color: #555; }
    .badge-inv    { background: #e3f2fd; color: #1565c0; }

    /* ── Place chip ── */
    .place-chip {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
    }

    /* ── Summary bar ── */
    .summary-bar {
      display: flex;
      gap: 0;
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .summary-item {
      flex: 1;
      text-align: center;
      padding: 12px 6px;
      border-right: 1px solid var(--border);
    }
    .summary-item:last-child { border-right: none; }
    .summary-val  { font-size: 20px; font-weight: 800; }
    .summary-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ── Assist list ── */
    .assist-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .assist-row:last-child { border-bottom: none; }
    .assist-row.assist-on { background: var(--green-bg); }
    .assist-row label { flex: 1; font-size: 14px; line-height: 1.4; cursor: pointer; }
    .assist-check { width: 22px; height: 22px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      height: 220px;
      margin-bottom: 16px;
    }

    /* ── Price history records ── */
    .record-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .record-row:last-child { border-bottom: none; }
    .record-date  { flex: 0 0 80px; color: var(--muted); font-size: 11px; }
    .record-price { flex: 0 0 72px; text-align: right; font-weight: 700; }
    .record-memo  { flex: 1; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 最安・最高バッジ */
    .badge-low  { background: #e8f5e9; color: #2e7d32; font-size: 10px; padding: 1px 6px; border-radius: 8px; }
    .badge-high { background: #fce4ec; color: #c62828; font-size: 10px; padding: 1px 6px; border-radius: 8px; }

    /* ── Sort buttons ── */
    .sort-bar {
      display: flex;
      gap: 5px;
      padding: 8px 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .sort-btn {
      padding: 4px 10px;
      border: 1.5px solid #ccc;
      border-radius: 14px;
      font-size: 11px;
      background: #fff;
      cursor: pointer;
      color: #555;
      white-space: nowrap;
    }
    .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 商品行の追加情報 */
    .product-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
      align-items: center;
    }
    .sub-item { font-size: 10px; color: var(--muted); }

    /* ── Place settings ── */
    .place-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .place-row:last-child { border-bottom: none; }
    .place-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .place-info { flex: 1; }
    .place-name-text { font-size: 14px; }
    .place-abbr-text { font-size: 11px; color: var(--muted); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #111;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Config overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay-box {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      width: 100%;
      max-width: 480px;
    }
    .overlay-box h2 { font-size: 17px; margin-bottom: 10px; }
    .overlay-box p  { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
    .overlay-box textarea { height: 140px; font-size: 12px; font-family: monospace; }

    /* ── Detail modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }
    .modal-box {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-box h3 { font-size: 15px; margin-bottom: 14px; line-height: 1.4; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }

    /* ── Search ── */
    .search-wrap { padding: 10px 12px 0; }

    /* ── Empty / Loading ── */
    .empty { text-align: center; padding: 36px 16px; color: var(--muted); font-size: 14px; }

    /* ── Stat row in history ── */
    .stat-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .stat-cell {
      flex: 1;
      text-align: center;
      padding: 10px 4px;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-val { font-size: 16px; font-weight: 800; }
    .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

    a.subtle { font-size: 12px; color: #1565c0; text-decoration: none; display: inline-block; margin-top: 10px; }
  </style>
</head>
<body>

<!-- Firebase config overlay -->
<div class="overlay" id="cfgOverlay">
  <div class="overlay-box">
    <h2>🔧 Firebase設定</h2>
    <p>Firebase Console でWebアプリの <code>firebaseConfig</code> の中身をJSON形式で貼り付けてください。</p>
    <div class="form-group">
      <textarea id="cfgInput" placeholder='{"apiKey":"xxx","authDomain":"xxx","projectId":"xxx","storageBucket":"xxx","messagingSenderId":"xxx","appId":"xxx"}'></textarea>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveConfig()">保存して開始</button>
  </div>
</div>

<!-- Product detail modal -->
<div class="modal-overlay" id="detailModal" style="display:none">
  <div class="modal-box" id="detailBox"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Tabs -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="record">価格を記録</button>
  <button class="tab-btn" data-tab="list">商品一覧</button>
  <button class="tab-btn" data-tab="history">履歴・推移</button>
  <button class="tab-btn" data-tab="assist">アシスト獲得</button>
  <button class="tab-btn" data-tab="places">取得場所の設定</button>
  <button class="tab-btn" data-tab="backup">バックアップ</button>
</nav>

<!-- ══════════════════════════════════════ -->
<!-- Tab: 価格を記録                       -->
<!-- ══════════════════════════════════════ -->
<div class="pane active" id="pane-record">
  <div class="card">
    <div class="section-title">商品を追加 / 価格を記録</div>

    <div class="form-group">
      <label>商品名</label>
      <input type="text" id="f-name" placeholder="例：ねんどろいど 初音ミク" list="nameSuggestions" autocomplete="off">
      <datalist id="nameSuggestions"></datalist>
    </div>

    <div class="form-group">
      <label>カテゴリ</label>
      <select id="f-cat">
        <option value="prize">プライズ・クレゲー</option>
        <option value="scale">スケールフィギュア</option>
        <option value="nendoroid">ねんどろいど</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div class="section-label">買取価格の記録</div>

    <div class="row2">
      <div class="form-group">
        <label>買取価格（円）</label>
        <input type="number" id="f-price" placeholder="例：2800" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>記録日</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <input type="text" id="f-memo" placeholder="状態など">
    </div>

    <div class="section-label">在庫情報（任意）</div>

    <div class="row2">
      <div class="form-group">
        <label>取得日</label>
        <input type="date" id="f-acqDate">
      </div>
      <div class="form-group">
        <label>取得金額（円）</label>
        <input type="number" id="f-acqPrice" placeholder="例：3500" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label>取得場所</label>
      <select id="f-acqPlace">
        <option value="">-- 選択 --</option>
      </select>
    </div>
    <div class="row2">
      <div class="form-group">
        <label>売却日</label>
        <input type="date" id="f-sellDate">
      </div>
      <div class="form-group">
        <label>売却金額（円）</label>
        <input type="number" id="f-sellPrice" placeholder="例：4000" inputmode="numeric">
      </div>
    </div>

    <button class="btn btn-primary btn-block" onclick="App.addRecord()">記録する</button>
    <a class="subtle" href="https://www.trader.co.jp/buy/" target="_blank" rel="noopener">↗ トレーダー買取検索を開く</a>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Tab: 商品一覧                         -->
<!-- ══════════════════════════════════════ -->
<div class="pane" id="pane-list">
  <!-- サマリーバー -->
  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><div class="summary-val" id="s-total">-</div><div class="summary-lbl">商品数</div></div>
    <div class="summary-item"><div class="summary-val" id="s-inv">-</div><div class="summary-lbl">在庫数</div></div>
    <div class="summary-item"><div class="summary-val" id="s-assist">-</div><div class="summary-lbl">アシスト</div></div>
    <div class="summary-item"><div class="summary-val" id="s-recs">-</div><div class="summary-lbl">価格記録</div></div>
  </div>

  <div class="card card-flush">
    <div class="search-wrap">
      <input type="text" id="listSearch" placeholder="🔍 商品名で検索..." oninput="App.renderList()" style="margin-bottom:10px">
    </div>
    <!-- ソートボタン -->
    <div class="sort-bar">
      <span style="font-size:11px;color:#aaa;align-self:center;margin-right:2px">並び替え：</span>
      <button class="sort-btn active" id="sort-name"     onclick="App.setSort('name')">名前</button>
      <button class="sort-btn"        id="sort-price"    onclick="App.setSort('price')">買取価格</button>
      <button class="sort-btn"        id="sort-acqDate"  onclick="App.setSort('acqDate')">取得日</button>
      <button class="sort-btn"        id="sort-recDate"  onclick="App.setSort('recDate')">入力日</button>
    </div>
    <div id="productList"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Tab: 履歴・推移                       -->
<!-- ══════════════════════════════════════ -->
<div class="pane" id="pane-history">
  <div class="card">
    <div class="form-group">
      <label>商品を選択</label>
      <select id="histSel" onchange="App.renderHistory()">
        <option value="">-- 選択してください --</option>
      </select>
    </div>

    <!-- 統計 -->
    <div id="histStats" style="display:none">
      <div class="stat-row" id="histStatRow"></div>

      <!-- グラフ -->
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>

      <!-- 記録一覧 -->
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">記録一覧</div>
      <div id="histRecords"></div>
    </div>

    <div id="histEmpty"><div class="empty">商品を選択してください</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Tab: アシスト獲得                     -->
<!-- ══════════════════════════════════════ -->
<div class="pane" id="pane-assist">
  <div class="card card-flush">
    <div id="assistList"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Tab: 取得場所の設定                   -->
<!-- ══════════════════════════════════════ -->
<div class="pane" id="pane-places">
  <div class="card">
    <div class="section-title">場所を追加</div>
    <div class="form-group">
      <label>場所名</label>
      <input type="text" id="p-name" placeholder="例：ME TOKYO IKEBUKURO">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>略称</label>
        <input type="text" id="p-abbr" placeholder="例：池袋ME">
      </div>
      <div class="form-group">
        <label>カラー</label>
        <select id="p-color">
          <option value="yellow">黄</option>
          <option value="green">緑</option>
          <option value="blue">青</option>
          <option value="orange">オレンジ</option>
          <option value="coral">コーラル</option>
          <option value="red">赤</option>
          <option value="purple">紫</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="App.addPlace()">追加</button>
  </div>
  <div class="card card-flush">
    <div id="placeList"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Tab: バックアップ                     -->
<!-- ══════════════════════════════════════ -->
<div class="pane" id="pane-backup">
  <div class="card">
    <div class="section-title">バックアップ</div>
    <button class="btn btn-secondary btn-block" onclick="App.exportData()">📥 JSONをエクスポート</button>
    <button class="btn btn-secondary btn-block" onclick="document.getElementById('importFile').click()" style="margin-top:8px">📤 JSONをインポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="App.importData(event)">
    <p style="font-size:12px;color:#888;margin-top:10px;">インポートは既存データに追加します（同一IDはスキップ）</p>
  </div>
  <div class="card">
    <div class="section-title">Firebase設定</div>
    <button class="btn btn-secondary btn-block" onclick="document.getElementById('cfgOverlay').style.display='flex'">⚙️ 設定を変更</button>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- Firebase + App Logic                  -->
<!-- ══════════════════════════════════════ -->
<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc,
  addDoc, setDoc, deleteDoc,
  onSnapshot, writeBatch
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Color map ──────────────────────────────────
const COLORS = {
  yellow:'#ffc107', green:'#43a047', blue:'#1e88e5',
  orange:'#fb8c00', coral:'#f4511e', red:'#e53935', purple:'#8e24aa'
};

// ── State ──────────────────────────────────────
let db = null;
let priceChart = null;
let sortBy  = 'name';
let sortDir = 1; // 1=昇順, -1=降順
const S = { products:[], inventories:[], records:[], places:[] };

// ── Utils ──────────────────────────────────────
const h   = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $   = id => document.getElementById(id);
const toast = msg => {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
};
const today = () => new Date().toISOString().slice(0,10);
const num   = id => parseInt($(id)?.value) || null;
const val   = id => $(id)?.value?.trim() || null;
const fmt   = n  => n != null ? `¥${Number(n).toLocaleString()}` : '─';

// ── Config ────────────────────────────────────
function loadConfig() {
  try { return JSON.parse(localStorage.getItem('fbConfig') || 'null'); } catch { return null; }
}
window.saveConfig = () => {
  try {
    const cfg = JSON.parse($('cfgInput').value.trim());
    localStorage.setItem('fbConfig', JSON.stringify(cfg));
    $('cfgOverlay').style.display = 'none';
    boot(cfg);
  } catch(e) { alert('JSONの形式が正しくありません:\n' + e.message); }
};

// ── Firebase boot ─────────────────────────────
function boot(cfg) {
  const app = initializeApp(cfg);
  db = getFirestore(app);
  ['products','inventories','records','places'].forEach(col => {
    onSnapshot(collection(db, col), snap => {
      S[col] = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      refresh(col);
    });
  });
}

function refresh(col) {
  if (col === 'products' || col === 'inventories') {
    App.renderList();
    App.renderAssist();
    updateProductAutocomplete();
    updateHistorySelect();
  }
  if (col === 'records') { App.renderList(); App.renderHistory(); }
  if (col === 'places')  { App.renderPlaces(); updatePlaceSelect(); }
}

// ── Tab switching ─────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('pane-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'history') updateHistorySelect();
  });
});

// ── Selects update ────────────────────────────
function updatePlaceSelect() {
  const sel = $('f-acqPlace');
  if (!sel) return;
  sel.innerHTML = '<option value="">-- 選択 --</option>' +
    S.places.map(p => `<option value="${h(p.name)}">${h(p.abbr || p.name)}</option>`).join('');
}
function updateProductAutocomplete() {
  const dl = $('nameSuggestions');
  if (dl) dl.innerHTML = S.products.map(p => `<option value="${h(p.name)}">`).join('');
}
function updateHistorySelect() {
  const sel = $('histSel');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 選択してください --</option>' +
    [...S.products].sort((a,b) => a.name.localeCompare(b.name,'ja'))
      .map(p => `<option value="${p.id}" ${p.id===cur?'selected':''}>${h(p.name)}</option>`).join('');
}

// ── App ───────────────────────────────────────
const App = window.App = {

  // ── 価格を記録 ──────────────────────────────
  async addRecord() {
    if (!db) return toast('Firebase未設定');
    const name  = val('f-name');
    const cat   = $('f-cat').value;
    const price = num('f-price');
    const date  = val('f-date') || today();
    const memo  = val('f-memo') || '';
    const acqDate   = val('f-acqDate');
    const acqPrice  = num('f-acqPrice');
    const acqPlace  = val('f-acqPlace');
    const sellDate  = val('f-sellDate');
    const sellPrice = num('f-sellPrice');

    if (!name) return toast('商品名を入力してください');
    if (!price && !acqDate && !acqPrice && !acqPlace && !sellDate && !sellPrice)
      return toast('価格か在庫情報を入力してください');

    let pid;
    const existing = S.products.find(p => p.name === name && p.cat === cat);
    if (existing) {
      pid = existing.id;
    } else {
      const ref = await addDoc(collection(db,'products'), { name, cat, assist:false });
      pid = ref.id;
    }

    const batch = writeBatch(db);
    if (price) batch.set(doc(collection(db,'records')), { pid, price, date, memo });
    if (acqDate || acqPrice || acqPlace || sellDate || sellPrice) {
      batch.set(doc(collection(db,'inventories')), {
        pid,
        acqDate: acqDate ?? null, acqPrice: acqPrice ?? null,
        acqPlace: acqPlace ?? null, sellDate: sellDate ?? null, sellPrice: sellPrice ?? null,
      });
    }
    await batch.commit();
    ['f-name','f-price','f-memo','f-acqDate','f-acqPrice','f-sellDate','f-sellPrice']
      .forEach(id => $(id).value = '');
    $('f-acqPlace').value = '';
    $('f-date').value = today();
    toast('記録しました ✓');
  },

  // ── ソート設定 ────────────────────────────
  setSort(key) {
    if (sortBy === key) {
      sortDir *= -1; // 同じキーなら昇順/降順切り替え
    } else {
      sortBy  = key;
      sortDir = key === 'name' ? 1 : -1; // 価格・日付は新しい/高い順がデフォルト
    }
    // ボタン見た目更新
    ['name','price','acqDate','recDate'].forEach(k => {
      const btn = $('sort-' + k);
      if (!btn) return;
      btn.classList.toggle('active', k === sortBy);
      btn.textContent = {
        name:'名前', price:'買取価格', acqDate:'取得日', recDate:'入力日'
      }[k] + (k === sortBy ? (sortDir === 1 ? ' ↑' : ' ↓') : '');
    });
    this.renderList();
  },

  // ── 商品一覧 ──────────────────────────────
  renderList() {
    // サマリー更新
    $('s-total').textContent  = S.products.length;
    $('s-inv').textContent    = S.inventories.length;
    $('s-assist').textContent = S.products.filter(p => p.assist).length;
    $('s-recs').textContent   = S.records.length;

    const q  = ($('listSearch')?.value || '').toLowerCase();
    const el = $('productList');
    if (!el) return;

    // 各商品に集計データを付与
    const withData = S.products
      .filter(p => p.name.toLowerCase().includes(q))
      .map(p => {
        const invs = S.inventories.filter(i => i.pid === p.id);
        const recs = S.records.filter(r => r.pid === p.id)
                     .sort((a,b) => (a.date||'').localeCompare(b.date||''));
        const latestRec = recs.length ? recs[recs.length - 1] : null;
        const prevPrice = recs.length > 1 ? recs[recs.length - 2].price : null;
        return { p, invs, recs, latestRec, prevPrice };
      });

    // ソート
    withData.sort((a, b) => {
      let va, vb;
      if (sortBy === 'name') {
        return sortDir * a.p.name.localeCompare(b.p.name, 'ja');
      } else if (sortBy === 'price') {
        va = a.latestRec?.price ?? -1;
        vb = b.latestRec?.price ?? -1;
      } else if (sortBy === 'acqDate') {
        va = a.invs[0]?.acqDate ?? '';
        vb = b.invs[0]?.acqDate ?? '';
      } else if (sortBy === 'recDate') {
        va = a.latestRec?.date ?? '';
        vb = b.latestRec?.date ?? '';
      }
      if (va < vb) return  sortDir;
      if (va > vb) return -sortDir;
      return 0;
    });

    if (!withData.length) { el.innerHTML = '<div class="empty">商品がありません</div>'; return; }

    el.innerHTML = withData.map(({ p, invs, recs, latestRec, prevPrice }) => {
      const latest = latestRec?.price ?? null;

      // 価格トレンド
      let trendHtml = '';
      if (latest != null && prevPrice != null) {
        if (latest > prevPrice)      trendHtml = `<span class="price-trend-up">▲${(latest-prevPrice).toLocaleString()}</span>`;
        else if (latest < prevPrice) trendHtml = `<span class="price-trend-down">▼${(prevPrice-latest).toLocaleString()}</span>`;
        else                         trendHtml = `<span class="price-trend-flat">─</span>`;
      }

      const inv   = invs[0];
      const place = inv?.acqPlace ? S.places.find(pl => pl.name === inv.acqPlace) : null;
      const chipStyle = place ? `background:${COLORS[place.color]||'#999'}` : '';

      // 取得情報行
      const acqParts = [
        inv?.acqDate  ? `📅 ${inv.acqDate}` : '',
        inv?.acqPrice ? `取得 ${fmt(inv.acqPrice)}` : '',
        place         ? `<span class="place-chip" style="${chipStyle}">${h(place.abbr||place.name)}</span>` : '',
      ].filter(Boolean);

      // 買取情報行
      const recParts = [
        latestRec?.date  ? `🏷 入力: ${latestRec.date}` : '',
        recs.length      ? `記録 ${recs.length}件` : '',
        invs.length > 1  ? `在庫 ${invs.length}個` : '',
      ].filter(Boolean);

      return `
        <div class="product-item ${p.assist?'assist-on':''}" onclick="App.openDetail('${p.id}')">
          <div class="product-price-col">
            ${latest != null
              ? `<div class="price-main">${latest >= 1000 ? (latest/1000).toFixed(1)+'k' : latest}</div>
                 <div class="price-label">円</div>
                 ${trendHtml}`
              : `<div class="price-main" style="font-size:13px;color:#bbb">─</div>`}
          </div>
          <div class="product-info-col">
            <div class="product-name">
              ${p.assist ? '<span class="badge badge-assist">アシスト</span> ' : ''}${h(p.name)}
            </div>
            ${acqParts.length ? `<div class="product-sub">${acqParts.map(s=>`<span class="sub-item">${s}</span>`).join('')}</div>` : ''}
            ${recParts.length ? `<div class="product-sub">${recParts.map(s=>`<span class="sub-item">${s}</span>`).join('')}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  },

  // ── 商品詳細モーダル ──────────────────────
  openDetail(pid) {
    const p = S.products.find(x => x.id === pid);
    if (!p) return;
    const invs = S.inventories.filter(i => i.pid === pid);
    const recs = S.records.filter(r => r.pid === pid)
                 .sort((a,b) => (b.date||'').localeCompare(a.date||''));

    const invHtml = invs.length ? invs.map(inv => {
      const place = inv.acqPlace ? S.places.find(pl => pl.name === inv.acqPlace) : null;
      const chipStyle = place ? `background:${COLORS[place.color]||'#999'}` : '';
      return `<div style="font-size:13px;padding:7px 0;border-bottom:1px solid #f0f0f0">
        ${inv.acqDate  ? `📅 ${inv.acqDate}` : ''}
        ${inv.acqPrice ? ` ${fmt(inv.acqPrice)}` : ''}
        ${place ? ` <span class="place-chip" style="${chipStyle};font-size:10px">${h(place.abbr||place.name)}</span>` : ''}
        ${inv.sellDate  ? `<br>💴 売却: ${inv.sellDate}` : ''}
        ${inv.sellPrice ? ` ${fmt(inv.sellPrice)}` : ''}
        <button class="btn btn-danger btn-sm" style="float:right" onclick="App.deleteInv('${inv.id}')">削除</button>
      </div>`;
    }).join('') : '<div style="font-size:13px;color:#888">在庫記録なし</div>';

    const recsHtml = recs.length ? recs.map(r =>
      `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px">
        <span style="color:#888;flex:0 0 82px;font-size:12px">${r.date||''}</span>
        <span style="font-weight:700">${fmt(r.price)}</span>
        ${r.memo ? `<span style="color:#888;font-size:11px">${h(r.memo)}</span>` : ''}
        <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="App.deleteRecord('${r.id}')">削除</button>
      </div>`).join('')
    : '<div style="font-size:13px;color:#888">価格記録なし</div>';

    $('detailBox').innerHTML = `
      <h3>${h(p.name)}</h3>
      <div style="font-size:12px;color:#888;margin-bottom:14px">カテゴリ: ${h(p.cat)}</div>
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">在庫情報</div>
      ${invHtml}
      <div style="font-size:12px;font-weight:700;margin:14px 0 8px">価格履歴</div>
      ${recsHtml}
      <div class="modal-actions">
        <button class="btn btn-danger" style="flex:1" onclick="App.deleteProduct('${p.id}')">商品を削除</button>
        <button class="btn btn-secondary" style="flex:1" onclick="App.closeDetail()">閉じる</button>
      </div>`;
    $('detailModal').style.display = 'flex';
  },

  closeDetail() { $('detailModal').style.display = 'none'; },

  async deleteRecord(id) {
    if (!confirm('この価格記録を削除しますか？')) return;
    await deleteDoc(doc(db,'records',id));
    toast('削除しました');
    this.closeDetail();
  },
  async deleteInv(id) {
    if (!confirm('この在庫記録を削除しますか？')) return;
    await deleteDoc(doc(db,'inventories',id));
    toast('削除しました');
    this.closeDetail();
  },
  async deleteProduct(pid) {
    if (!confirm('この商品と関連する全記録を削除しますか？')) return;
    const batch = writeBatch(db);
    batch.delete(doc(db,'products',pid));
    S.records.filter(r => r.pid===pid).forEach(r => batch.delete(doc(db,'records',r.id)));
    S.inventories.filter(i => i.pid===pid).forEach(i => batch.delete(doc(db,'inventories',i.id)));
    await batch.commit();
    toast('削除しました');
    this.closeDetail();
  },

  // ── 履歴・推移（グラフ付き） ──────────────
  renderHistory() {
    const pid  = $('histSel')?.value;
    const stats = $('histStats');
    const empty = $('histEmpty');
    if (!pid) {
      if (stats) stats.style.display = 'none';
      if (empty) empty.innerHTML = '<div class="empty">商品を選択してください</div>';
      if (empty) empty.style.display = 'block';
      return;
    }

    const recs = S.records.filter(r => r.pid === pid)
                 .sort((a,b) => (a.date||'').localeCompare(b.date||''));
    if (!recs.length) {
      if (stats) stats.style.display = 'none';
      if (empty) { empty.innerHTML = '<div class="empty">価格記録がありません</div>'; empty.style.display = 'block'; }
      return;
    }

    if (empty) empty.style.display = 'none';
    if (stats) stats.style.display = 'block';

    const prices = recs.map(r => r.price);
    const maxP   = Math.max(...prices);
    const minP   = Math.min(...prices);
    const avgP   = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
    const latest = prices[prices.length - 1];

    // 統計
    $('histStatRow').innerHTML = `
      <div class="stat-cell"><div class="stat-val">${fmt(latest)}</div><div class="stat-lbl">最新</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:#2e7d32">${fmt(minP)}</div><div class="stat-lbl">最安</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:#c62828">${fmt(maxP)}</div><div class="stat-lbl">最高</div></div>
      <div class="stat-cell"><div class="stat-val">${fmt(avgP)}</div><div class="stat-lbl">平均</div></div>
      <div class="stat-cell"><div class="stat-val">${recs.length}</div><div class="stat-lbl">記録数</div></div>`;

    // グラフ描画
    if (priceChart) { priceChart.destroy(); priceChart = null; }
    const ctx = $('priceChart').getContext('2d');
    priceChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: recs.map(r => r.date || '─'),
        datasets: [{
          label: '買取価格',
          data: prices,
          backgroundColor: prices.map(p =>
            p === minP ? 'rgba(67,160,71,0.75)' :
            p === maxP ? 'rgba(229,57,53,0.75)' :
                         'rgba(30,136,229,0.6)'
          ),
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `¥${ctx.parsed.y.toLocaleString()}`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: false,
            ticks: {
              callback: v => `¥${v.toLocaleString()}`,
              font: { size: 10 }
            },
            grid: { color: '#f0f0f0' }
          },
          x: {
            ticks: { font: { size: 10 }, maxRotation: 45 },
            grid: { display: false }
          }
        }
      }
    });

    // 記録一覧（新しい順）
    const recsSorted = [...recs].reverse();
    $('histRecords').innerHTML = recsSorted.map(r => {
      const isMin = r.price === minP;
      const isMax = r.price === maxP;
      return `<div class="record-row">
        <div class="record-date">${r.date||'─'}</div>
        <div class="record-price">
          ${fmt(r.price)}
          ${isMin && !isMax ? '<span class="badge-low">最安</span>' : ''}
          ${isMax && !isMin ? '<span class="badge-high">最高</span>' : ''}
        </div>
        <div class="record-memo">${h(r.memo||'')}</div>
        <button class="btn btn-danger btn-sm" onclick="App.deleteHistRecord('${r.id}')">×</button>
      </div>`;
    }).join('');
  },

  async deleteHistRecord(id) {
    if (!confirm('この記録を削除しますか？')) return;
    await deleteDoc(doc(db,'records',id));
    toast('削除しました');
  },

  // ── アシスト獲得 ──────────────────────────
  renderAssist() {
    const el = $('assistList');
    if (!el) return;
    if (!S.products.length) { el.innerHTML = '<div class="empty">商品がありません</div>'; return; }
    const sorted = [...S.products].sort((a,b) => a.name.localeCompare(b.name,'ja'));
    el.innerHTML = sorted.map(p => `
      <div class="assist-row ${p.assist?'assist-on':''}" id="ar-${p.id}">
        <input type="checkbox" class="assist-check" id="ac-${p.id}"
          ${p.assist?'checked':''} onchange="App.toggleAssist('${p.id}',this.checked)">
        <label for="ac-${p.id}">${h(p.name)}</label>
        ${p.assist ? '<span class="badge badge-assist">アシスト</span>' : ''}
      </div>`).join('');
  },

  async toggleAssist(id, v) {
    if (!db) return;
    await setDoc(doc(db,'products',id), { assist:v }, { merge:true });
  },

  // ── 取得場所 ──────────────────────────────
  async addPlace() {
    if (!db) return toast('Firebase未設定');
    const name  = val('p-name');
    const abbr  = val('p-abbr') || '';
    const color = $('p-color').value;
    if (!name) return toast('場所名を入力してください');
    if (S.places.find(p => p.name === name)) return toast('同じ名前の場所がすでにあります');
    await addDoc(collection(db,'places'), { name, abbr, color });
    $('p-name').value = '';
    $('p-abbr').value = '';
    toast('追加しました ✓');
  },

  renderPlaces() {
    const el = $('placeList');
    if (!el) return;
    if (!S.places.length) { el.innerHTML = '<div class="empty">場所がありません</div>'; return; }
    el.innerHTML = S.places.map(p => `
      <div class="place-row">
        <div class="place-dot" style="background:${COLORS[p.color]||'#999'}"></div>
        <div class="place-info">
          <div class="place-name-text">${h(p.name)}</div>
          ${p.abbr ? `<div class="place-abbr-text">${h(p.abbr)}</div>` : ''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="App.deletePlace('${p.id}')">削除</button>
      </div>`).join('');
  },

  async deletePlace(id) {
    if (!confirm('この場所を削除しますか？')) return;
    await deleteDoc(doc(db,'places',id));
    toast('削除しました');
  },

  // ── バックアップ ──────────────────────────
  exportData() {
    const data = JSON.stringify(
      { products:S.products, inventories:S.inventories, records:S.records, places:S.places },
      null, 2
    );
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download = `prize-backup-${today()}.json`;
    a.click();
    toast('エクスポートしました');
  },

  async importData(e) {
    if (!db) return toast('Firebase未設定');
    const file = e.target.files[0];
    if (!file) return;
    let data;
    try { data = JSON.parse(await file.text()); } catch { return toast('JSONの読み込みに失敗しました'); }

    const existingIds = {
      products:    new Set(S.products.map(x=>x.id)),
      inventories: new Set(S.inventories.map(x=>x.id)),
      records:     new Set(S.records.map(x=>x.id)),
      places:      new Set(S.places.map(x=>x.name)),
    };

    const batch = writeBatch(db);
    let count = 0;
    for (const col of ['products','inventories','records','places']) {
      for (const item of (data[col]||[])) {
        const { id, ...rest } = item;
        if (col === 'places') {
          if (existingIds.places.has(item.name)) continue;
        } else if (id && existingIds[col].has(id)) {
          continue;
        }
        const ref = (id && col !== 'places') ? doc(db,col,id) : doc(collection(db,col));
        batch.set(ref, rest);
        count++;
      }
    }
    await batch.commit();
    toast(`${count}件インポートしました ✓`);
    e.target.value = '';
  },
};

// ── Modal backdrop ────────────────────────────
$('detailModal').addEventListener('click', e => {
  if (e.target === $('detailModal')) App.closeDetail();
});

// ── Init ──────────────────────────────────────
$('f-date').value = today();
const cfg = loadConfig();
if (cfg) { $('cfgOverlay').style.display = 'none'; boot(cfg); }
</script>
</body>
</html>
